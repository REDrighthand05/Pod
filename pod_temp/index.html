<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pod — 科技树</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#06060e;color:#e2e8f0;font-family:"Inter","PingFang SC","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased;user-select:none}

/* ── Background ── */
.bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-layer .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.25}
.bg-layer .orb:nth-child(1){width:600px;height:600px;background:radial-gradient(circle,rgba(59,130,246,0.4),transparent 70%);top:-120px;left:-80px}
.bg-layer .orb:nth-child(2){width:500px;height:500px;background:radial-gradient(circle,rgba(139,92,246,0.3),transparent 70%);bottom:-100px;right:-60px}
.bg-layer .orb:nth-child(3){width:400px;height:400px;background:radial-gradient(circle,rgba(16,185,129,0.2),transparent 70%);top:40%;right:20%}
.bg-layer .orb:nth-child(4){width:350px;height:350px;background:radial-gradient(circle,rgba(236,72,153,0.15),transparent 70%);bottom:20%;left:10%}

/* ── Glass Panel ── */
.glass-panel{position:relative;z-index:1;display:flex;flex-direction:column;width:100%;height:100%;background:rgba(7,7,20,0.68);backdrop-filter:blur(48px) saturate(120%);-webkit-backdrop-filter:blur(48px) saturate(120%)}

/* ── Titlebar ── */
.titlebar{height:46px;display:flex;align-items:center;padding:0 16px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.04);-webkit-app-region:drag}
.titlebar .logo{width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.2);border-radius:6px;color:#60a5fa;font-size:12px}
.titlebar .title{font-size:13px;font-weight:500;color:#cbd5e1;margin-left:10px;letter-spacing:.3px}
.titlebar .ver{font-size:10px;color:rgba(100,116,139,0.4);margin-left:6px}
.titlebar .spacer{flex:1}
.titlebar .status-dot{width:6px;height:6px;border-radius:50%;background:#34d399;box-shadow:0 0 8px rgba(52,211,153,0.3)}
.titlebar .status-text{font-size:10px;color:rgba(148,163,184,0.4);margin-left:6px;letter-spacing:.2px}

/* ── Navbar ── */
.navbar{height:40px;display:flex;align-items:center;padding:0 12px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.025);gap:6px}
.navbar .seg{display:flex;background:rgba(255,255,255,0.03);border-radius:8px;padding:2px}
.navbar .seg-btn{padding:5px 14px;border:none;background:transparent;color:#64748b;font-size:11.5px;font-family:inherit;cursor:pointer;border-radius:6px;transition:all .12s}
.navbar .seg-btn:hover{color:#93c5fd;background:rgba(96,165,250,0.06)}
.navbar .seg-btn.act{background:rgba(96,165,250,0.12);color:#60a5fa}
.navbar .spacer{flex:1}
.navbar .icon-btn{width:30px;height:30px;border:none;background:transparent;color:#64748b;font-size:16px;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center}
.navbar .icon-btn:hover{background:rgba(255,255,255,0.04);color:#94a3b8}

/* ── Canvas ── */
.canvas-wrap{flex:1;position:relative;overflow:hidden;cursor:grab}
.canvas-wrap:active{cursor:grabbing}
.canvas-wrap canvas{display:block;width:100%;height:100%}

/* ── Detail Panel ── */
.detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:10000;background:rgba(0,0,0,0.35);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);opacity:0;visibility:hidden;transition:opacity .3s ease,visibility .3s ease}
.detail-overlay.active{opacity:1;visibility:visible}
.detail-panel{position:absolute;top:0;right:0;width:400px;height:100%;background:rgba(22,22,30,0.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-left:1px solid rgba(255,255,255,0.06);box-shadow:-8px 0 32px rgba(0,0,0,0.3);transform:translateX(100%);transition:transform .4s cubic-bezier(0.22,1,0.36,1);overflow-y:auto;padding:28px 24px;color:#e0e0e0;font-family:"Inter","PingFang SC",-apple-system,sans-serif}
.detail-overlay.active .detail-panel{transform:translateX(0)}
.detail-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border:none;background:rgba(255,255,255,0.06);border-radius:8px;color:#888;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.detail-close:hover{background:rgba(255,255,255,0.12);color:#fff}
.detail-icon{font-size:40px;margin-bottom:8px}
.detail-name{font-size:22px;font-weight:600;color:#fff;margin-bottom:4px;line-height:1.3}
.detail-path{font-size:13px;color:#888;margin-bottom:20px;line-height:1.4}
.detail-section{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#666;margin-top:16px;margin-bottom:6px}
.detail-desc{font-size:14px;line-height:1.6;color:#bbb}
.detail-rank{display:flex;gap:6px}
.rank-lvl{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:12px;font-weight:600;border:2px solid rgba(255,255,255,0.1);color:#555;transition:all .2s}
.rank-lvl.has{border-color:#4ade80;color:#4ade80;background:rgba(74,222,128,0.1)}
.rank-lvl.cur{border-color:#60a5fa;color:#60a5fa;background:rgba(96,165,250,0.15);box-shadow:0 0 12px rgba(96,165,250,0.2)}
.detail-prereqs,.detail-next{display:flex;flex-wrap:wrap;gap:6px}
.detail-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:12px;background:rgba(255,255,255,0.06);color:#bbb;cursor:default;transition:background .2s}
.detail-chip:hover{background:rgba(255,255,255,0.1)}
.detail-chip .chip-icon{font-size:10px}
.detail-resource{display:block;padding:8px 10px;border-radius:6px;background:rgba(255,255,255,0.04);color:#bbb;font-size:13px;text-decoration:none;margin-bottom:4px;transition:background .2s;line-height:1.4}
.detail-resource:hover{background:rgba(255,255,255,0.08);color:#fff}
.detail-resource .res-type{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;background:rgba(96,165,250,0.15);color:#60a5fa;margin-right:6px}
.detail-hours{font-size:20px;font-weight:600;color:#fbbf24}
.detail-btn{display:block;width:100%;padding:12px;margin-top:24px;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;transition:all .25s}
.detail-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,0.35)}
.detail-btn:active{transform:translateY(0)}
.detail-btn.in-queue{background:rgba(255,255,255,0.08);color:#60a5fa}
.detail-btn.in-queue:hover{background:rgba(255,255,255,0.12);box-shadow:none}

/* ── Queue Panel ── */
.queue-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9000;background:rgba(0,0,0,0.25);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);opacity:0;visibility:hidden;transition:opacity .25s ease,visibility .25s ease}
.queue-overlay.active{opacity:1;visibility:visible}
.queue-panel{position:absolute;bottom:64px;right:24px;width:380px;max-height:520px;background:rgba(22,22,30,0.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.06);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,0.4);display:flex;flex-direction:column;transform:scale(0.92) translateY(16px);opacity:0;transition:transform .3s cubic-bezier(0.22,1,0.36,1),opacity .3s ease;font-family:"Inter","PingFang SC",-apple-system,sans-serif;color:#e0e0e0;overflow:hidden}
.queue-overlay.active .queue-panel{transform:scale(1) translateY(0);opacity:1}
.queue-header{display:flex;align-items:center;gap:8px;padding:16px 20px 12px;border-bottom:1px solid rgba(255,255,255,0.06)}
.queue-title{font-size:15px;font-weight:600;color:#fff}
.queue-badge{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 6px;border-radius:10px;font-size:11px;font-weight:600;background:#6366f1;color:#fff}
.queue-close{margin-left:auto;width:28px;height:28px;border:none;background:transparent;border-radius:6px;color:#666;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.queue-close:hover{background:rgba(255,255,255,0.08);color:#fff}
.queue-list{flex:1;overflow-y:auto;padding:8px 12px;min-height:80px}
.queue-list-empty{display:flex;align-items:center;justify-content:center;height:80px;color:#555;font-size:13px}
.queue-footer{padding:10px 20px 14px;border-top:1px solid rgba(255,255,255,0.06)}
.queue-clear{width:100%;padding:8px;border:none;border-radius:8px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;background:rgba(239,68,68,0.1);color:#ef4444;transition:all .2s}
.queue-clear:hover{background:rgba(239,68,68,0.2)}
.queue-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;margin-bottom:2px;cursor:grab;transition:background 0.15s;user-select:none;border:1px solid transparent}
.queue-item:hover{background:rgba(255,255,255,0.04)}
.queue-item.dragging{opacity:.4;background:rgba(99,102,241,0.08);border-color:rgba(99,102,241,0.2)}
.queue-item.drag-over{border-top-color:#6366f1}
.qi-icon{font-size:18px;width:32px;text-align:center;flex-shrink:0}
.qi-info{flex:1;min-width:0}
.qi-name{font-size:13px;font-weight:500;color:#e0e0e0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.qi-progress{display:flex;gap:3px}
.qi-progress .qi-lvl{width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:7px;font-weight:700;border:1.5px solid rgba(255,255,255,0.12);color:#444}
.qi-progress .qi-lvl.has{border-color:#4ade80;color:#4ade80;background:rgba(74,222,128,0.1)}
.qi-progress .qi-lvl.cur{border-color:#60a5fa;color:#60a5fa;background:rgba(96,165,250,0.12)}
.qi-meta{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.qi-time{font-size:11px;color:#888;white-space:nowrap}
.qi-tag{font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px}
.qi-tag.high{background:rgba(239,68,68,0.15);color:#ef4444}
.qi-tag.medium{background:rgba(251,191,36,0.15);color:#fbbf24}
.qi-tag.low{background:rgba(96,165,250,0.15);color:#60a5fa}
.qi-remove{width:24px;height:24px;border:none;background:transparent;border-radius:6px;color:#555;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;opacity:0}
.queue-item:hover .qi-remove{opacity:1}
.qi-remove:hover{background:rgba(239,68,68,0.15);color:#ef4444}

/* ── Search ── */
.search-mask{position:fixed;top:0;left:0;right:0;bottom:0;z-index:11000;background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:flex-start;justify-content:center;padding-top:15vh;opacity:0;visibility:hidden;transition:opacity .25s ease,visibility .25s ease}
.search-mask.active{opacity:1;visibility:visible}
.search-dialog{width:520px;max-width:90vw;max-height:60vh;background:rgba(22,22,30,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.08);border-radius:16px;box-shadow:0 16px 48px rgba(0,0,0,0.5);display:flex;flex-direction:column;transform:translateY(-20px);transition:transform .3s cubic-bezier(0.22,1,0.36,1);font-family:"Inter","PingFang SC",-apple-system,sans-serif;overflow:hidden}
.search-mask.active .search-dialog{transform:translateY(0)}
.search-input{width:100%;padding:16px 20px;border:none;outline:none;background:transparent;font-size:16px;font-family:inherit;color:#fff;border-bottom:1px solid rgba(255,255,255,0.06)}
.search-input::placeholder{color:#555}
.search-results{flex:1;overflow-y:auto;padding:8px;min-height:60px}
.search-results-empty{display:flex;align-items:center;justify-content:center;height:60px;color:#555;font-size:13px}
.search-result-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .15s}
.search-result-item:hover,.search-result-item.active{background:rgba(255,255,255,0.06)}
.sri-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0}
.sri-info{flex:1;min-width:0}
.sri-name{font-size:14px;font-weight:500;color:#fff}
.sri-path{font-size:11px;color:#666;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sri-match{font-size:11px;color:#60a5fa;flex-shrink:0}

/* ── Status Bar ── */
.status-bar{position:fixed;bottom:0;left:0;right:0;height:40px;z-index:8000;display:flex;align-items:center;gap:16px;padding:0 16px;background:rgba(10,10,14,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,0.04);font-family:"Inter","PingFang SC",-apple-system,sans-serif;font-size:12px;color:#777;user-select:none}
.status-bar .spacer{flex:1}
.status-bar b{color:#bbb;font-weight:600}
.zoom-ctrl{display:flex;align-items:center;gap:6px}
.zoom-ctrl button{width:24px;height:24px;border:none;background:rgba(255,255,255,0.04);border-radius:6px;color:#888;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit;line-height:1}
.zoom-ctrl button:hover{background:rgba(255,255,255,0.1);color:#fff}
#zoomVal{min-width:38px;text-align:center;font-variant-numeric:tabular-nums;color:#999}
.status-bar .time{color:#555;font-variant-numeric:tabular-nums}

/* ── Scrollbars ── */
.detail-panel::-webkit-scrollbar,.queue-list::-webkit-scrollbar,.search-results::-webkit-scrollbar{width:4px}
.detail-panel::-webkit-scrollbar-track,.queue-list::-webkit-scrollbar-track,.search-results::-webkit-scrollbar-track{background:transparent}
.detail-panel::-webkit-scrollbar-thumb,.queue-list::-webkit-scrollbar-thumb,.search-results::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
.detail-panel::-webkit-scrollbar-thumb:hover,.queue-list::-webkit-scrollbar-thumb:hover,.search-results::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.15)}

/* ── Responsive ── */
@media (max-width:640px){
  .detail-panel{width:100%!important}
  .queue-panel{right:8px;width:calc(100vw - 16px)}
  .search-dialog{width:96vw;max-width:96vw}
}
</style>
</head>
<body>
<div class="bg-layer">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>
<div class="glass-panel">
  <div class="titlebar">
    <div class="logo">◆</div>
    <div class="title">Pod</div>
    <div class="ver">v0.1.0</div>
    <div class="spacer"></div>
    <div class="status-dot"></div>
    <div class="status-text">在线</div>
  </div>
  <div class="navbar">
    <div class="seg">
      <button class="seg-btn act" id="navSkill">技能树</button>
      <button class="seg-btn" id="navTech">科技树</button>
    </div>
    <div class="spacer"></div>
    <button class="icon-btn" id="searchToggle" title="搜索">⌕</button>
    <button class="icon-btn" id="queueToggle" title="学习队列">☰</button>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="treeCanvas"></canvas>
    <div id="skillTreeOverlay" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(7,7,20,0.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);opacity:0;visibility:hidden;transition:opacity 0.3s ease,visibility 0.3s ease;z-index:10">
      <div style="font-size:48px;margin-bottom:16px;opacity:0.3">🌳</div>
      <div style="font-size:18px;font-weight:500;color:rgba(255,255,255,0.3);margin-bottom:8px">技能树视图</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.15)">开发中 · 敬请期待</div>
    </div>
  </div>
</div>

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel" id="detailPanel">
    <button class="detail-close" id="detailClose">✕</button>
    <div class="detail-icon" id="dIcon"></div>
    <div class="detail-name" id="dName"></div>
    <div class="detail-path" id="dPath"></div>
    <div class="detail-section">描述</div>
    <div class="detail-desc" id="dDesc"></div>
    <div class="detail-section">学习等级</div>
    <div class="detail-rank" id="dRank"></div>
    <div class="detail-section">前置要求</div>
    <div class="detail-prereqs" id="dPrereqs"></div>
    <div class="detail-section">后续节点</div>
    <div class="detail-next" id="dNext"></div>
    <div class="detail-section">推荐资源</div>
    <div class="detail-resources" id="dResources"></div>
    <div class="detail-section">预计时间</div>
    <div class="detail-hours" id="dHours"></div>
    <button class="detail-btn" id="dQueueBtn">加入学习队列</button>
  </div>
</div>

<div class="queue-overlay" id="queueOverlay">
  <div class="queue-panel" id="queuePanel">
    <div class="queue-header">
      <div class="queue-title">学习队列</div>
      <div class="queue-badge" id="queueBadge">0</div>
      <button class="queue-close" id="queueClose">✕</button>
    </div>
    <div class="queue-list" id="queueList">
      <div class="queue-list-empty" id="queueEmpty">队列为空，点击节点添加学习任务</div>
    </div>
    <div class="queue-footer">
      <button class="queue-clear" id="queueClear">清空队列</button>
    </div>
  </div>
</div>

<div class="search-mask" id="searchMask">
  <div class="search-dialog" id="searchDialog">
    <input class="search-input" id="searchInput" type="text" placeholder="搜索节点名称、标签..." autocomplete="off">
    <div class="search-results" id="searchResults">
      <div class="search-results-empty" id="searchEmpty">输入关键词开始搜索</div>
    </div>
  </div>
</div>

<div class="status-bar" id="statusBar">
  <span><b id="nodeCount">0</b> 节点</span>
  <span class="spacer"></span>
  <span>FPS <b id="fpsVal">0</b></span>
  <div class="zoom-ctrl">
    <button id="zoomOut">−</button>
    <span id="zoomVal">85%</span>
    <button id="zoomIn">+</button>
  </div>
</div>

<script>/* =============================================
   PodData — 47-node dataset
   ============================================= */
var PodData = (function() {
  var nodes = [
    {id:"root",label:"计算机科学知识体系",description:"计算机科学六大核心领域——数学理论、硬件体系、软件算法、系统工程、人工智能、应用实践，构筑完整的知识图谱。",icon:"🌳",prerequisites:[],resources:[],estHours:0,tier:0,category:"root",tags:["计算机科学","知识体系"]},
    {id:"math",label:"数学与理论基础",description:"计算机科学的数学根基，涵盖离散结构、计算理论、信息论与数值方法。",icon:"∑",prerequisites:[],resources:[],estHours:0,tier:1,category:"root",tags:["数学","理论"]},
    {id:"math-discrete",label:"离散数学",description:"研究离散结构的数学分支，是计算机科学最直接的数学基础。",icon:"⊂",prerequisites:["math"],resources:[{name:"离散数学及其应用",type:"book"},{name:"MIT 6.042J Mathematics for Computer Science",type:"course"}],estHours:80,tier:2,category:"math",tags:["离散数学","基础"]},

  }

  function bindUI() {
    // Detail panel close
    var doc=document,over=detailOverlay;
    doc.getElementById("detailClose").addEventListener("click", closeDetail);
    over.addEventListener("click", function(e) { if (e.target === over) closeDetail(); });
    // Queue panel close
    queueClose.addEventListener("click", hideQueue);
    queueOverlay.addEventListener("click", function(e) { if (e.target === queueOverlay) hideQueue(); });
    queueClear.addEventListener("click", function() {
      PodEngine.queue.clear();
      renderQueue();
      updateDetailBtn();
    });
    // Search
    searchToggle.addEventListener("click", toggleSearch);
    queueToggle.addEventListener("click", toggleQueue);
    searchMask.addEventListener("click", function(e) { if (e.target === searchMask) hideSearch(); });
    searchInput.addEventListener("input", function() { renderSearch(this.value); });
    searchInput.addEventListener("keydown", function(e) { if (e.key === "Escape") hideSearch(); });
    // Nav segmented
    navSkill.addEventListener("click", function() { setView("skill"); });
    navTech.addEventListener("click", function() { setView("tech"); });
    // Zoom controls
    zoomOut.addEventListener("click", function() { PodRender.camera.zoomAt(0.85, window.innerWidth/2, window.innerHeight/2); });
    zoomIn.addEventListener("click", function() { PodRender.camera.zoomAt(1.18, window.innerWidth/2, window.innerHeight/2); });
    // Detail queue button
    dQueueBtn.addEventListener("click", function() {
      if (!currentDetailId) return;
      if (PodEngine.queue.has(currentDetailId)) {
        PodEngine.queue.remove(currentDetailId);
      } else {
        PodEngine.queue.add(currentDetailId);
      }
      renderQueue();
      updateDetailBtn();
    });
    // Keyboard shortcuts
    doc.addEventListener("keydown", function(e) {
      if (e.key === "Escape") { closeDetail(); hideSearch(); hideQueue(); }
      if ((e.ctrlKey || e.metaKey) && e.key === "f") { e.preventDefault(); showSearch(); }
      if (e.key === "/" && !searchMask.classList.contains("active")) { e.preventDefault(); showSearch(); }
    });
  }

  // ── Detail Panel ──
  function openDetail(nodeId) {
    var data = PodData.getNode(nodeId);
    if (!data) return;
    currentDetailId = nodeId;
    dIcon.textContent = data.icon || "○";
    dName.textContent = data.label;
    // Path
    var path = [];
    var cur = data;
    while (cur) {
      if (cur.id === "root") break;
      path.unshift(cur.label);
      if (cur.parentIds && cur.parentIds.length) {
        cur = PodData.getNode(cur.parentIds[0]);
      } else { break; }
    }
    dPath.textContent = path.join(" → ");
    dDesc.textContent = data.description || "";
    // Rank levels I-V
    dRank.innerHTML = "";
    for (var i=1;i<=5;i++) {
      var lvl = document.createElement("div");
      lvl.className = "rank-lvl" + (i <= 3 ? " has" : "") + (i === 2 ? " cur" : "");
      lvl.textContent = ["I","II","III","IV","V"][i-1];
      dRank.appendChild(lvl);
    }
    // Prerequisites
    dPrereqs.innerHTML = "";
    if (data.prerequisites && data.prerequisites.length) {
      data.prerequisites.forEach(function(pid) {
        var pn = PodData.getNode(pid);
        if (pn) {
          var chip = document.createElement("span");
          chip.className = "detail-chip";
          chip.innerHTML = '<span class="chip-icon">◆</span> ' + pn.label;
          chip.addEventListener("click", function() { closeDetail(); openDetail(pid); });
          chip.style.cursor = "pointer";
          dPrereqs.appendChild(chip);
        }
      });
    } else {
      dPrereqs.innerHTML = '<span style="color:#555;font-size:12px">无前置要求</span>';
    }
    // Next nodes
    dNext.innerHTML = "";
    var children = PodData.getChildren(nodeId);
    if (children && children.length) {
      children.forEach(function(cid) {
        var cn = PodData.getNode(cid);
        if (cn) {
          var chip = document.createElement("span");
          chip.className = "detail-chip";
          chip.innerHTML = '<span class="chip-icon">▶</span> ' + cn.label;
          chip.addEventListener("click", function() { closeDetail(); openDetail(cid); });
          chip.style.cursor = "pointer";
          dNext.appendChild(chip);
        }
      });
    } else {
      dNext.innerHTML = '<span style="color:#555;font-size:12px">无后续节点</span>';
    }
    // Resources
    dResources.innerHTML = "";
    if (data.resources && data.resources.length) {
      data.resources.forEach(function(r) {
        var a = document.createElement("a");
        a.className = "detail-resource";
        a.href = "#";
        var typeColors = {book:"#6366f1",course:"#f59e0b",practice:"#10b981",tool:"#ec4899",paper:"#8b5cf6",article:"#06b6d4"};
        var col = typeColors[r.type] || "#6366f1";
        a.innerHTML = '<span class="res-type" style="background:'+col+'22;color:'+col+'">' + (r.type||"link") + '</span>' + r.name;
        dResources.appendChild(a);
      });
    } else {
      dResources.innerHTML = '<span style="color:#555;font-size:12px">暂无推荐资源</span>';
    }
    // Hours
    dHours.innerHTML = '<span class="detail-hours">' + (data.estHours || "—") + '</span> 小时';
    // Queue button
    updateDetailBtn();
    // Show
    detailOverlay.classList.add("active");
  }

  function closeDetail() {
    detailOverlay.classList.remove("active");
    currentDetailId = null;
  }

    function saveState() {
    try {
      var state = {
        detailId: currentDetailId,
        camera: PodRender.camera ? { x: PodRender.camera.x, y: PodRender.camera.y, zoom: PodRender.camera.zoom } : null
      };
      sessionStorage.setItem('pod_ui_state', JSON.stringify(state));
    } catch(e) {}
  }
  function restoreState() {
    try {
      var raw = sessionStorage.getItem('pod_ui_state');
      if (!raw) return;
      var state = JSON.parse(raw);
      if (state.camera && PodRender.camera) {
        PodRender.camera.x = state.camera.x;
        PodRender.camera.y = state.camera.y;
        if (PodRender.camera.setZoom) PodRender.camera.setZoom(state.camera.zoom);
      }
      if (state.detailId && PodData.getNode(state.detailId)) openDetail(state.detailId);
    } catch(e) {}
  }
  window.addEventListener('beforeunload', saveState);

function updateDetailBtn() {
    if (!currentDetailId) return;
    if (PodEngine.queue.has(currentDetailId)) {
      dQueueBtn.textContent = "✓ 已在队列中 — 移除";
      dQueueBtn.className = "detail-btn in-queue";
    } else {
      dQueueBtn.textContent = "加入学习队列";
      dQueueBtn.className = "detail-btn";
    }
  }

  // ── Queue Panel ──
  function toggleQueue() {
    if (queueOverlay.classList.contains("active")) {
      hideQueue();
    } else {
      showQueue();
    }
  }
  function showQueue() { queueOverlay.classList.add("active"); renderQueue(); hideSearch(); closeDetail(); }
  function hideQueue() { queueOverlay.classList.remove("active"); }

  function renderQueue() {
    var items = PodEngine.queue.items;
    queueBadge.textContent = items.length;
    var html = "";
    if (!items.length) {
      queueList.innerHTML = '<div class="queue-list-empty">队列为空，点击节点添加学习任务</div>';
      return;
    }
    for (var i=0;i<items.length;i++) {
      var item = items[i];
      var node = PodData.getNode(item.nodeId);
      if (!node) continue;
      var elapsed = Math.floor((Date.now() - item.addedAt) / 3600000);
      var timeStr = elapsed < 1 ? "刚加入" : elapsed + "h";
      var tagClass = item.priority || "medium";
      html += '<div class="queue-item" data-idx="' + i + '">';
      html += '<div class="qi-icon">' + (node.icon||"○") + '</div>';
      html += '<div class="qi-info">';
      html += '<div class="qi-name">' + node.label + '</div>';
      html += '<div class="qi-progress">';
      for (var l=1;l<=5;l++) {
        var cls = "qi-lvl" + (l <= 3 ? " has" : "");
        html += '<div class="' + cls + '">' + ["I","II","III","IV","V"][l-1] + '</div>';
      }
      html += '</div></div>';
      html += '<div class="qi-meta">';
      html += '<div class="qi-time">' + timeStr + '</div>';
      html += '<div class="qi-tag ' + tagClass + '">' + tagClass + '</div>';
      html += '</div>';
      html += '<button class="qi-remove" data-idx="' + i + '">✕</button>';
      html += '</div>';
    }
    queueList.innerHTML = html;
    // Bind remove buttons
    queueList.querySelectorAll(".qi-remove").forEach(function(btn) {
      btn.addEventListener("click", function(e) {
        e.stopPropagation();
        var idx = parseInt(this.dataset.idx);
        var item = PodEngine.queue.items[idx];
        if (item) {
          PodEngine.queue.remove(item.nodeId);
          renderQueue();
          updateDetailBtn();
        }
      });
    });
    // Bind click to navigate to node
    queueList.querySelectorAll(".queue-item").forEach(function(el) {
      el.addEventListener("click", function(e) {
        if (e.target.closest(".qi-remove")) return;
        var idx = parseInt(this.dataset.idx);
        var item = PodEngine.queue.items[idx];
        if (item) {
          hideQueue();
          var node = PodData.getNode(item.nodeId);
          if (node && PodRender.renderNodes) {
            var rns = PodRender.renderNodes();
            for (var k=0;k<rns.length;k++) {
              if (rns[k].id === item.nodeId) {
                PodRender.camera.x = rns[k].x;
                PodRender.camera.y = rns[k].y;
                PodRender.camera.setZoom(1.2);
                break;
              }
            }
            openDetail(item.nodeId);
          }
        }
      });
    });
    // Drag to reorder
    initQueueDrag();
  }

  var _dragState = null;
  function initQueueDrag() {
    var items = queueList.querySelectorAll(".queue-item");
    items.forEach(function(el) {
      el.draggable = true;
      el.addEventListener("dragstart", function(e) {
        _dragState = { from: parseInt(this.dataset.idx) };
        this.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
      });
      el.addEventListener("dragend", function() {
        this.classList.remove("dragging");
        items.forEach(function(i){i.classList.remove("drag-over");});
        _dragState = null;
      });
      el.addEventListener("dragover", function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        if (_dragState && parseInt(this.dataset.idx) !== _dragState.from) {
          items.forEach(function(i){i.classList.remove("drag-over");});
          this.classList.add("drag-over");
        }
      });
      el.addEventListener("dragleave", function() { this.classList.remove("drag-over"); });
      el.addEventListener("drop", function(e) {
        e.preventDefault();
        this.classList.remove("drag-over");
        if (_dragState) {
          var to = parseInt(this.dataset.idx);
          PodEngine.queue.reorder(_dragState.from, to);
          renderQueue();
        }
      });
    });
  }

  // ── Search ──
  function toggleSearch() {
    if (searchMask.classList.contains("active")) {
      hideSearch();
    } else {
      showSearch();
    }
  }
  function showSearch() {
    searchMask.classList.add("active");
    searchInput.value = "";
    searchResults.innerHTML = '<div class="search-results-empty" id="searchEmpty">输入关键词开始搜索</div>';
    setTimeout(function() { searchInput.focus(); }, 100);
    hideQueue(); closeDetail();
  }
  function hideSearch() { searchMask.classList.remove("active"); }

  function renderSearch(query) {
    var results = PodData.getFiltered(query);
    if (!results || !results.length) {
      searchResults.innerHTML = '<div class="search-results-empty">没有找到匹配节点</div>';
      return;
    }
    var html = "";
    for (var i=0;i<results.length;i++) {
      var n = results[i];
      var matchField = "";
      var q = query.toLowerCase().trim();
      if (n.label.toLowerCase().indexOf(q) !== -1) matchField = "名称匹配";
      else if (n.id.toLowerCase().indexOf(q) !== -1) matchField = "ID匹配";
      else if ((n.tags||[]).some(function(t){return t.toLowerCase().indexOf(q)!==-1;})) matchField = "标签匹配";
      html += '<div class="search-result-item" data-id="' + n.id + '">';
      html += '<div class="sri-icon">' + (n.icon||"○") + '</div>';
      html += '<div class="sri-info">';
      html += '<div class="sri-name">' + n.label + '</div>';
      html += '<div class="sri-path">' + n.description.substring(0,40) + (n.description.length>40?"…":"") + '</div>';
      html += '</div>';
      html += '<div class="sri-match">' + matchField + '</div>';
      html += '</div>';
    }
    searchResults.innerHTML = html;
    searchResults.querySelectorAll(".search-result-item").forEach(function(el) {
      el.addEventListener("click", function() {
        var id = this.dataset.id;
        if (id) {
          hideSearch();
          var node = PodData.getNode(id);
          if (node && PodRender.renderNodes) {
            var rns = PodRender.renderNodes();
            for (var k=0;k<rns.length;k++) {
              if (rns[k].id === id) {
                PodRender.camera.x = rns[k].x;
                PodRender.camera.y = rns[k].y;
                PodRender.camera.setZoom(1.2);
                break;
              }
            }
            openDetail(id);
          }
        }
      });
    });
  }

  // ── Navigation ──
  function setView(mode) {
    if (mode === "tech") {
      navTech.classList.add("act");
      navSkill.classList.remove("act");
    } else {
      navSkill.classList.add("act");
      navTech.classList.remove("act");
    }
  }

  // ── FPS Counter ──
  function startFpsCounter() {
    var last = performance.now();
    function tick() {
      var now = performance.now();
      fpsFrames++;
      if (now - fpsTime >= 1000) {
        if (fpsVal) fpsVal.textContent = fpsFrames;
        fpsFrames = 0;
        fpsTime = now;
      }
      requestAnimationFrame(tick);
    }
    fpsTime = performance.now();
    requestAnimationFrame(tick);
  }

  // ── Public API ──
  return {
    init: init,
    openDetail: openDetail,
    closeDetail: closeDetail,
    toggleQueue: toggleQueue,
    showQueue: showQueue,
    hideQueue: hideQueue,
    showSearch: showSearch,
    hideSearch: hideSearch,
    renderQueue: renderQueue
  ,
    saveState: saveState,
    restoreState: restoreState
  };
})();/* =============================================
   Boot — initialize everything
   ============================================= */
(function() {
  var allNodes = PodData.all;
  var nodeMap = PodData.map;

  // Filter out root node for rendering
  var renderNodes = allNodes.filter(function(n) { return n.id !== "root"; });

  // Run force layout
  PodEngine.forceLayout(renderNodes, nodeMap);

  // Set nodes on renderer
  PodRender.setNodes(renderNodes);

  // Initialize canvas
  var canvasEl = document.getElementById("treeCanvas");
  PodRender.init(canvasEl);

  // Fit camera to show all nodes
  PodRender.camera.fitToNodes(renderNodes);

  // Connect node click → detail panel
  PodRender.onNodeClick = function(node) {
    PodUI.openDetail(node.id);
  };

  // Initialize UI
  PodUI.init();
    PodUI.restoreState();

  // Update node count
  var nc = document.getElementById("nodeCount");
  if (nc) nc.textContent = renderNodes.length;

  // Start animation
  PodRender.start();

  // Throttled resize
  var resizeTimer = null;
  window.addEventListener("resize", function() {
    if (resizeTimer) clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      PodRender.resize();
      if (PodRender.camera.fitToNodes) {
        var rns = PodRender.renderNodes();
        if (rns && rns.length) PodRender.camera.fitToNodes(rns);
      }
    }, 150);
  });
})();
</script>
</body>
